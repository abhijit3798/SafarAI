<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SafarAI - Offline</title>
  <style>
    :root {
      --color-primary: #2563EB;
      --color-secondary: #0F172A;
      --text-primary: #1E293B;
      --text-secondary: #64748B;
      --bg-primary: #FFFFFF;
      --bg-secondary: #F8FAFC;
      --border-color: #E2E8F0;
      --radius-md: 12px;
      --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: var(--font-family);
      color: var(--text-primary);
      background-color: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }

    .card {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      padding: 40px 24px;
      max-width: 380px;
      width: 100%;
    }

    .icon-container {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(37, 99, 235, 0.08);
      color: var(--color-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px auto;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 800;
      margin: 0 0 12px 0;
      color: var(--color-secondary);
    }

    p {
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--text-secondary);
      margin: 0 0 32px 0;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      font-size: 0.9rem;
      font-weight: 700;
      padding: 12px 24px;
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      background-color: var(--color-primary);
      color: white;
    }

    .btn-primary:hover {
      background-color: #1d4ed8;
    }

    .btn-secondary {
      background-color: transparent;
      border-color: var(--border-color);
      color: var(--color-secondary);
    }

    .btn-secondary:hover {
      background-color: var(--bg-secondary);
      border-color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-container">
      <!-- Custom SVG Wireless Off Icon -->
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.5M5 12.5a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.58 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01" />
      </svg>
    </div>

    <h1>No Internet Connection</h1>
    <p>SafarAI needs an active network connection to plan new trips. However, you can still view and explore your saved itineraries offline.</p>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="window.location.reload()">
        Retry Connection
      </button>
      <a class="btn btn-secondary" href="/#saved" onclick="setTimeout(() => window.location.reload(), 50)">
        View Saved Trips
      </a>
    </div>
  </div>
</body>
</html>
